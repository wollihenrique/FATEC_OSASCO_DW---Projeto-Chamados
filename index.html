<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Quatá</title>
    <style>
        body { margin: 0; display: grid; place-items: center; height: 100vh; font-family: Arial, sans-serif; background-color: #f5f5f5; }
        .login-box { background: white; padding: 30px; border: 1px solid #000; border-radius: 8px; width: 350px; text-align: center; }
        /* Container que envolve a logo */
        .logo-container {
         display: grid;           /* Ativa o sistema Grid */
         place-items: center;     /* Centraliza horizontal e verticalmente o conteúdo */
         width: 100%;             /* Garante que o container use toda a largura disponível */
         margin-bottom: 20px;     /* Espaço entre a logo e a caixa de login */
        }

       /* Ajustes na imagem */
        .logo-img {
         max-width: 200px;        /* Define um tamanho máximo para a logo não ficar gigante */
         height: auto;            /* Mantém a proporção da imagem */
         display: block;          /* Remove espaços em branco indesejados abaixo da imagem */
        }

        a {
            text-decoration: none;
            color: white;
        }

        .form-group { text-align: left; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; background: #e8e8e8; border: none; border-radius: 4px; box-sizing: border-box; }
        .hint { font-size: 10px; color: #666; }
        .btn { width: 100%; padding: 12px; background: #135d7c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
        <img src="/css/img/logo-quata.webp" alt="Quatá" class="logo-img">
        </div>
        <div class="login-box">
            <h2>LOGIN</h2>
            <form action="" method="">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email" placeholder="fulanodetal@quata.com.br" required>
                </div>
                <div class="form-group">
                    <label>Senha:</label>
                    <input type="password" name="senha" required>
                    <span class="hint">A senha deve conter no mínimo 8 caracteres com letras e números</span>
                </div>
                <button type="" class="btn"><a href="home.php">Entrar</a></button>
            </form>
        </div>
    </div>
</body>
</html>
